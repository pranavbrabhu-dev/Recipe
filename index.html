<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Hero | Recipe Finder</title>
    <meta name="description" content="Find delicious recipes based on what's in your fridge.">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="container">
        <header>
            <h1 class="logo">Fridge<span class="highlight">Hero</span> 🍳</h1>
            <p class="subtitle">Discover amazing recipes with what you have.</p>
        </header>

        <section class="input-section glass-panel">
            <h2>What's in your fridge?</h2>
            <div class="multi-input-container">
                <div class="input-wrapper">
                    <input type="text" id="ingredient-input-1" placeholder="Ingredient 1 (e.g., tomatoes)" autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="ingredient-input-2" placeholder="Ingredient 2 (e.g., chicken)" autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="ingredient-input-3" placeholder="Ingredient 3 (e.g., garlic)" autocomplete="off">
                </div>
            </div>
            <div class="action-buttons">
                <button id="find-recipes-btn" class="primary-btn pulse">Find Recipes</button>
                <button id="cook-magic-btn" class="magic-btn">Cook Magic 🪄</button>
            </div>
            <div class="api-key-wrapper">
                <input type="password" id="gemini-api-key" placeholder="Gemini API Key (Required for Magic)">
            </div>
        </section>

        <section id="ai-response-section" class="ai-section hidden">
            <h2>AI Chef Recommendations</h2>
            <div class="ai-card">
                <div id="ai-loader" class="loader hidden">👩‍🍳 Thinking of a brilliant recipe...</div>
                <div id="ai-content" class="ai-content"></div>
            </div>
        </section>

        <section id="results-section" class="results-section hidden">
            <h2 id="results-title">Delicious Possibilities</h2>
            <div id="recipe-grid" class="recipe-grid">
                <!-- Recipe cards will be appended here -->
            </div>
            <div id="empty-state" class="empty-state hidden">
                <p>No recipes found with these ingredients. Try adding something else!</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
